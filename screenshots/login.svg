<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <filter id="shadow1">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="390" height="844" rx="44" fill="#1a1a2e"/>
  <rect x="8" y="8" width="374" height="828" rx="38" fill="#F9FAFB"/>
  <!-- 状态栏 -->
  <rect x="8" y="8" width="374" height="44" rx="38" fill="rgba(255,255,255,0.92)"/>
  <text x="28" y="34" font-size="14" font-weight="600" fill="#333" font-family="Arial">9:41</text>
  <rect x="335" y="24" width="18" height="10" rx="3" fill="#333"/>
  <rect x="325" y="25" width="8" height="8" rx="2" fill="#333"/>
  <circle cx="315" cy="29" r="4" fill="#333"/>
  <!-- 导航栏 -->
  <rect x="8" y="52" width="374" height="56" fill="rgba(255,255,255,0.92)"/>
  <line x1="8" y1="108" x2="382" y2="108" stroke="#E5E7EB" stroke-width="1"/>
  <text x="28" y="86" font-size="18" font-weight="700" fill="#111827">🚗 校区拼车</text>
  <!-- 登录卡片 -->
  <rect x="35" y="140" width="320" height="400" rx="20" fill="#fff" filter="url(#shadow1)"/>
  <text x="195" y="190" font-size="22" font-weight="700" fill="#111827" text-anchor="middle">欢迎回来</text>
  <text x="195" y="214" font-size="14" fill="#6B7280" text-anchor="middle">登录校区拼车平台</text>
  <!-- 邮箱输入 -->
  <text x="55" y="258" font-size="14" font-weight="600" fill="#374151">手机号 / 邮箱</text>
  <rect x="53" y="268" width="284" height="44" rx="8" fill="#fff" stroke="#E5E7EB" stroke-width="2"/>
  <text x="65" y="294" font-size="15" fill="#9CA3AF">输入手机号或邮箱</text>
  <!-- 密码输入 -->
  <text x="55" y="340" font-size="14" font-weight="600" fill="#374151">密码</text>
  <rect x="53" y="350" width="284" height="44" rx="8" fill="#fff" stroke="#E5E7EB" stroke-width="2"/>
  <text x="65" y="376" font-size="15" fill="#9CA3AF">输入密码</text>
  <!-- 登录按钮 -->
  <rect x="53" y="416" width="284" height="48" rx="8" fill="#4F46E5"/>
  <text x="195" y="446" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">登录</text>
  <!-- 注册链接 -->
  <text x="195" y="490" font-size="14" fill="#6B7280" text-anchor="middle">还没有账号？</text>
  <text x="272" y="490" font-size="14" font-weight="600" fill="#4F46E5">立即注册</text>
  <!-- 忘记密码 -->
  <text x="195" y="515" font-size="13" fill="#9CA3AF" text-anchor="middle">忘记密码？</text>
  <!-- 底部文字 -->
  <text x="195" y="710" font-size="12" fill="#D1D5DB" text-anchor="middle">让通勤更简单 🚗</text>
</svg>
