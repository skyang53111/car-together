<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="banner" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="shadow1">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.07"/>
    </filter>
    <filter id="shadowCard">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08"/>
    </filter>
  </defs>
  <!-- 手机壳 -->
  <rect x="0" y="0" width="390" height="844" rx="44" fill="#1a1a2e"/>
  <rect x="8" y="8" width="374" height="828" rx="38" fill="#F9FAFB"/>
  <!-- 状态栏 -->
  <rect x="8" y="8" width="374" height="44" rx="38" fill="#fff" opacity="0.9"/>
  <text x="28" y="34" font-size="14" font-weight="600" fill="#333" font-family="Arial">9:41</text>
  <rect x="335" y="24" width="18" height="10" rx="3" fill="#333"/>
  <rect x="325" y="25" width="8" height="8" rx="2" fill="#333"/>
  <circle cx="315" cy="29" r="4" fill="#333"/>
  <!-- 导航栏 -->
  <rect x="8" y="52" width="374" height="56" fill="#fff" opacity="0.92"/>
  <line x1="8" y1="108" x2="382" y2="108" stroke="#E5E7EB" stroke-width="1"/>
  <text x="28" y="86" font-size="18" font-weight="700" fill="#111827">🚗 校区拼车</text>
  <rect x="265" y="68" width="50" height="28" rx="8" fill="#E5E7EB"/><text x="275" y="86" font-size="13" fill="#374151">登录</text>
  <rect x="320" y="68" width="50" height="28" rx="8" fill="#4F46E5"/><text x="330" y="86" font-size="13" fill="#fff" font-weight="600">注册</text>
  <!-- Banner -->
  <rect x="24" y="122" width="342" height="100" rx="16" fill="url(#banner)"/>
  <text x="48" y="158" font-size="20" font-weight="700" fill="#fff">让通勤更简单</text>
  <text x="48" y="180" font-size="14" fill="rgba(255,255,255,0.9)">覆盖南校区 · 北校区 · 月亮岛校区</text>
  <text x="48" y="202" font-size="13" fill="rgba(255,255,255,0.8)">🚗 今日 3 趟拼车   📌 12 个有效行程</text>
  <!-- 搜索栏 -->
  <rect x="24" y="236" width="260" height="44" rx="10" fill="#fff" stroke="#E5E7EB" stroke-width="2"/>
  <text x="36" y="262" font-size="14" fill="#9CA3AF">🔍 搜索目的地、出发地...</text>
  <rect x="292" y="236" width="74" height="44" rx="10" fill="#4F46E5"/>
  <text x="315" y="262" font-size="14" font-weight="600" fill="#fff">搜索</text>
  <!-- 筛选栏 -->
  <rect x="24" y="292" width="100" height="34" rx="8" fill="#fff" stroke="#4F46E5" stroke-width="2"/>
  <text x="32" y="314" font-size="13" fill="#4F46E5" font-weight="600">全部校区 ▾</text>
  <rect x="132" y="292" width="110" height="34" rx="8" fill="#fff" stroke="#E5E7EB" stroke-width="2"/>
  <text x="140" y="314" font-size="13" fill="#9CA3AF">日期选择 ▾</text>
  <rect x="250" y="292" width="70" height="34" rx="8" fill="#fff" stroke="#4F46E5" stroke-width="2"/>
  <text x="260" y="314" font-size="13" fill="#4F46E5" font-weight="600">今 天</text>
  <rect x="328" y="292" width="38" height="34" rx="8" fill="#fff" stroke="#EF4444" stroke-width="2"/>
  <text x="333" y="314" font-size="13" fill="#EF4444">重置</text>
  <!-- 拼车卡片1 -->
  <rect x="24" y="340" width="342" height="145" rx="16" fill="#fff" filter="url(#shadowCard)"/>
  <rect x="24" y="340" width="342" height="1" fill="#F3F4F6"/>
  <text x="40" y="372" font-size="15" font-weight="600" fill="#1F2937">南校区西门</text>
  <text x="172" y="372" font-size="15" font-weight="600" fill="#4F46E5">→</text>
  <text x="192" y="372" font-size="15" font-weight="600" fill="#1F2937">高铁站</text>
  <rect x="280" y="358" width="70" height="22" rx="12" fill="#D1FAE5"/>
  <text x="290" y="374" font-size="12" font-weight="600" fill="#10B981">余 3/4 座</text>
  <text x="40" y="400" font-size="13" fill="#6B7280">🕐 2025-06-20 14:30</text>
  <text x="235" y="400" font-size="13" fill="#6B7280">👤 张三</text>
  <text x="40" y="422" font-size="13" fill="#9CA3AF">🔒 预订后可查看联系方式</text>
  <line x1="24" y1="460" x2="366" y2="460" stroke="#F3F4F6" stroke-width="1"/>
  <rect x="24" y="460" width="342" height="25" rx="0" fill="#4F46E5"/>
  <path d="M 24 485 Q 195 485 366 485" fill="#4F46E5"/>
  <text x="195" y="478" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">立即预订</text>
  <!-- 拼车卡片2 -->
  <rect x="24" y="500" width="342" height="145" rx="16" fill="#fff" filter="url(#shadowCard)"/>
  <text x="40" y="532" font-size="15" font-weight="600" fill="#1F2937">北校区东门</text>
  <text x="172" y="532" font-size="15" font-weight="600" fill="#4F46E5">→</text>
  <text x="192" y="532" font-size="15" font-weight="600" fill="#1F2937">机场</text>
  <rect x="280" y="518" width="70" height="22" rx="12" fill="#D1FAE5"/>
  <text x="290" y="534" font-size="12" font-weight="600" fill="#10B981">余 2/3 座</text>
  <text x="40" y="560" font-size="13" fill="#6B7280">🕐 2025-06-21 08:00</text>
  <text x="235" y="560" font-size="13" fill="#6B7280">👤 李四</text>
  <text x="40" y="582" font-size="13" fill="#6B7280">💬 拼车AA，每人15元</text>
  <line x1="24" y1="620" x2="366" y2="620" stroke="#F3F4F6" stroke-width="1"/>
  <rect x="24" y="620" width="342" height="25" rx="0" fill="#4F46E5"/>
  <path d="M 24 645 Q 195 645 366 645" fill="#4F46E5"/>
  <text x="195" y="638" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">立即预订</text>
  <!-- 底部导航 -->
  <rect x="8" y="780" width="374" height="56" fill="rgba(255,255,255,0.92)"/>
  <line x1="8" y1="780" x2="382" y2="780" stroke="#E5E7EB" stroke-width="1"/>
  <text x="65" y="824" font-size="11" fill="#4F46E5" text-anchor="middle">🏠 首页</text>
  <text x="170" y="824" font-size="11" fill="#6B7280" text-anchor="middle">➕ 发布</text>
  <text x="275" y="824" font-size="11" fill="#6B7280" text-anchor="middle">📋 预订</text>
  <text x="363" y="824" font-size="11" fill="#6B7280" text-anchor="middle">👤 我的</text>
</svg>
