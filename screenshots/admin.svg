<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <!-- 背景 -->
  <rect x="0" y="0" width="800" height="500" fill="#F9FAFB"/>
  <!-- 侧边栏 -->
  <rect x="0" y="0" width="220" height="500" fill="#111827"/>
  <text x="24" y="36" font-size="18" font-weight="700" fill="#fff">⚙️ 后台管理</text>
  <line x1="0" y1="56" x2="220" y2="56" stroke="#374151" stroke-width="1"/>
  <!-- 侧边栏菜单 - 仪表盘（选中） -->
  <rect x="0" y="72" width="220" height="42" fill="#1F2937"/>
  <line x1="0" y1="72" x2="0" y2="114" stroke="#6366F1" stroke-width="3"/>
  <text x="28" y="100" font-size="14" fill="#fff">📊 仪表盘</text>
  <rect x="175" y="86" width="18" height="14" rx="7" fill="#EF4444"/>
  <text x="184" y="97" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">3</text>
  <!-- 其他菜单 -->
  <text x="28" y="142" font-size="14" fill="#9CA3AF">👥 用户管理</text>
  <text x="28" y="184" font-size="14" fill="#9CA3AF">🚗 拼车管理</text>
  <text x="28" y="226" font-size="14" fill="#9CA3AF">📌 预订管理</text>
  <text x="28" y="268" font-size="14" fill="#9CA3AF">🔧 系统配置</text>
  <!-- 侧边栏底部 -->
  <line x1="0" y1="430" x2="220" y2="430" stroke="#374151" stroke-width="1"/>
  <text x="28" y="460" font-size="13" fill="#6B7280">← 返回前台</text>
  <text x="28" y="482" font-size="13" fill="#6B7280">🚪 退出登录</text>
  <!-- 主内容区 -->
  <text x="250" y="36" font-size="22" font-weight="700" fill="#111827">📊 仪表盘</text>
  <!-- 统计卡片 -->
  <rect x="250" y="60" width="120" height="105" rx="10" fill="#fff"/>
  <line x1="250" y1="60" x2="370" y2="60" stroke="#4F46E5" stroke-width="3" stroke-linecap="round"/>
  <text x="310" y="92" font-size="14" fill="#6B7280" text-anchor="middle">👥 普通用户</text>
  <text x="310" y="135" font-size="28" font-weight="700" fill="#4F46E5" text-anchor="middle">42</text>

  <rect x="382" y="60" width="120" height="105" rx="10" fill="#fff"/>
  <line x1="382" y1="60" x2="502" y2="60" stroke="#10B981" stroke-width="3" stroke-linecap="round"/>
  <text x="442" y="92" font-size="14" fill="#6B7280" text-anchor="middle">🚗 进行中拼车</text>
  <text x="442" y="135" font-size="28" font-weight="700" fill="#4F46E5" text-anchor="middle">12</text>

  <rect x="514" y="60" width="120" height="105" rx="10" fill="#fff"/>
  <line x1="514" y1="60" x2="634" y2="60" stroke="#F59E0B" stroke-width="3" stroke-linecap="round"/>
  <text x="574" y="92" font-size="14" fill="#6B7280" text-anchor="middle">📌 有效预订</text>
  <text x="574" y="135" font-size="28" font-weight="700" fill="#4F46E5" text-anchor="middle">28</text>

  <rect x="646" y="60" width="120" height="105" rx="10" fill="#fff"/>
  <line x1="646" y1="60" x2="766" y2="60" stroke="#EF4444" stroke-width="3" stroke-linecap="round"/>
  <text x="706" y="92" font-size="14" fill="#6B7280" text-anchor="middle">🆕 今日新增</text>
  <text x="706" y="135" font-size="28" font-weight="700" fill="#4F46E5" text-anchor="middle">3</text>

  <!-- 表格标题区 -->
  <rect x="250" y="185" width="520" height="300" rx="10" fill="#fff"/>
  <rect x="250" y="185" width="520" height="44" rx="10" fill="#F9FAFB"/>
  <text x="270" y="212" font-size="13" font-weight="600" fill="#6B7280">ID</text>
