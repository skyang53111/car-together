  <text x="400" y="212" font-size="13" font-weight="600" fill="#6B7280">昵称</text>
  <text x="480" y="212" font-size="13" font-weight="600" fill="#6B7280">角色</text>
  <text x="540" y="212" font-size="13" font-weight="600" fill="#6B7280">状态</text>
  <text x="620" y="212" font-size="13" font-weight="600" fill="#6B7280">注册时间</text>
  <!-- 最近注册用户标题 -->
  <text x="270" y="190" font-size="15" font-weight="600" fill="#1F2937">👥 最近注册的用户</text>

  <!-- 行1 -->
  <text x="270" y="258" font-size="13" fill="#374151">1</text>
  <text x="310" y="258" font-size="13" fill="#374151">138****1234</text>
  <text x="400" y="258" font-size="13" fill="#374151">小明</text>
  <text x="480" y="258" font-size="13" fill="#374151">用户</text>
  <rect x="535" y="248" width="30" height="20" rx="4" fill="#D1FAE5"/>
  <text x="550" y="262" font-size="12" font-weight="600" fill="#10B981" text-anchor="middle">正常</text>
  <text x="620" y="258" font-size="13" fill="#374151">2025-06-20</text>
  <line x1="250" y1="272" x2="770" y2="272" stroke="#F3F4F6" stroke-width="1"/>

  <!-- 行2 -->
  <text x="270" y="298" font-size="13" fill="#374151">2</text>
  <text x="310" y="298" font-size="13" fill="#374151">139****5678</text>
  <text x="400" y="298" font-size="13" fill="#374151">小红</text>
  <text x="480" y="298" font-size="13" fill="#374151">用户</text>
  <rect x="535" y="288" width="30" height="20" rx="4" fill="#D1FAE5"/>
  <text x="550" y="302" font-size="12" font-weight="600" fill="#10B981" text-anchor="middle">正常</text>
  <text x="620" y="298" font-size="13" fill="#374151">2025-06-19</text>
  <line x1="250" y1="312" x2="770" y2="312" stroke="#F3F4F6" stroke-width="1"/>

  <!-- 行3 -->
  <text x="270" y="338" font-size="13" fill="#374151">3</text>
  <text x="310" y="338" font-size="13" fill="#374151">136****9012</text>
  <text x="400" y="338" font-size="13" fill="#374151">系统管理员</text>
  <rect x="468" y="328" width="50" height="20" rx="4" fill="#EEF2FF"/>
  <text x="493" y="342" font-size="12" font-weight="600" fill="#4F46E5" text-anchor="middle">超管</text>
  <rect x="535" y="328" width="30" height="20" rx="4" fill="#D1FAE5"/>
  <text x="550" y="342" font-size="12" font-weight="600" fill="#10B981" text-anchor="middle">正常</text>
  <text x="620" y="338" font-size="13" fill="#374151">2025-06-15</text>
