<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网站更新中 - 校区拼车平台</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
            background-color: #f7f8fa;
            text-align: center;
            padding: 50px 20px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            min-height: 100vh;
        }
        h1 { font-size: 36px; color: #333; margin-bottom: 20px; }
        p { font-size: 16px; color: #666; margin-bottom: 30px; }
        .progress-bar { width: 100%; max-width: 500px; height: 8px; background: #e5e7eb; border-radius: 4px; overflow: hidden; }
        .progress { height: 100%; background: #4F46E5; width: 85%; border-radius: 4px; animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    </style>
</head>
<body>
    <div style="font-size:64px;margin-bottom:20px;">🚧</div>
    <h1>网站更新中，敬请期待</h1>
    <p>我们正在全力打造更好的使用体验，稍后回来</p>
    <div class="progress-bar"><div class="progress"></div></div>
</body>
</html>
